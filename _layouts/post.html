---
layout: default
---

{%-include back_link.html-%}

<article>
  <p class="post-meta">
    <time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time>
    <span class="count-slot" data-count-path="{{ page.url | relative_url }}"></span>
  </p>
  
  <h1>{{ page.title }}</h1>

  {{ content }}

  <hr>
  <p class="post-subscribe">Like this? Subscribe via <a href="{{ "/feed.xml" | relative_url }}">RSS</a> to get new posts in your reader.</p>
</article>
